[project]
name = "promptforge-backend"
version = "0.1.0"
description = "PromptForge — production-tested AI prompt knowledge platform (FastAPI backend)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    # [standard] pulls in the fastapi-cli runner FastAPI Cloud uses to start the app.
    "fastapi[standard]>=0.115.0",
    "sqlalchemy>=2.0.36",
    "alembic>=1.14.0",
    "asyncpg>=0.30.0",
    "aiosqlite>=0.20.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib>=1.7.4",
    "bcrypt>=4.0,<4.1",
    "python-multipart>=0.0.12",
    "email-validator>=2.2.0",
    "httpx>=0.27.0",
    "redis>=5.2.0",
    "orjson>=3.10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
    "mypy>=1.13.0",
]

# Tell FastAPI Cloud / `fastapi run` exactly which app to start (no auto-discovery).
# Resolved relative to the app directory (backend/), where the `app` package lives.
[tool.fastapi]
entrypoint = "app.main:app"

[tool.ruff]
line-length = 120
target-version = "py310"
# Autogenerated migrations and the demo seed script (large embedded HTML/CSS
# template strings) are exempt from formatting lints.
extend-exclude = ["alembic/versions", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "C4", "SIM"]
ignore = [
    "B008",   # FastAPI Depends() in defaults is idiomatic
    "UP042",  # StrEnum requires 3.11; we support 3.10
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
plugins = ["pydantic.mypy"]
strict = true
ignore_missing_imports = true

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]
