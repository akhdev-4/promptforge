# PromptForge reverse proxy: routes /api → backend, everything else → frontend.
upstream promptforge_backend {
    server backend:8000;
}
upstream promptforge_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # API and OpenAPI docs → FastAPI.
    location /api/ {
        proxy_pass http://promptforge_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /docs {
        proxy_pass http://promptforge_backend;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://promptforge_backend;
    }

    # Everything else → Next.js.
    location / {
        proxy_pass http://promptforge_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
